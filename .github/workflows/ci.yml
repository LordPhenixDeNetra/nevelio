name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace

  docker:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nevelio:ci .

      - name: Smoke test — version
        run: docker run --rm nevelio:ci --version

      - name: Smoke test — modules list
        run: docker run --rm nevelio:ci --accept-legal modules list

      - name: Smoke test — dry-run scan
        run: |
          docker run --rm nevelio:ci \
            --accept-legal scan --url https://httpbin.org --dry-run
