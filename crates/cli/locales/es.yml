legal.title: "AVISO LEGAL"
legal.body: "Nevelio es una herramienta de pentest de APIs diseñada EXCLUSIVAMENTE\npara sistemas que usted posee o sobre los que tiene autorización\nescrita explícita para realizar pruebas.\n\nUsar esta herramienta sin autorización es ILEGAL en la mayoría\nde jurisdicciones (CFAA, Directiva UE sobre ataques a sistemas\nde información y leyes locales de cibercrimen).\n\nAl continuar, confirma que:\n  1. Tiene autorización explícita para probar el objetivo.\n  2. Acepta plena responsabilidad legal por sus acciones.\n  3. Tratará todos los hallazgos como confidenciales."
legal.prompt: "¿Acepta estos términos? [s/N]: "
legal.cancelled: "Escaneo cancelado. Aviso legal no aceptado."
legal.tagline: "Escáner de seguridad de APIs — Solo uso autorizado"

